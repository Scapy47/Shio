name: Build and Release

permissions:
  contents: write

on:
  push:
    branches:
      - release
  workflow_dispatch:

env:
  BIN_NAME: shio

jobs:
  build:
    name: Build Linux + Windows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            x86_64-unknown-linux-gnu
            x86_64-pc-windows-gnu

      - name: Install Windows Cross Compiler
        run: |
          sudo apt update
          sudo apt install -y mingw-w64

      - name: Build Linux Binary
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Build Windows Binary
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Rename Binaries
        run: |
          cp target/x86_64-unknown-linux-gnu/release/${BIN_NAME} ${BIN_NAME}-Linux-x86_64
          cp target/x86_64-pc-windows-gnu/release/${BIN_NAME}.exe ${BIN_NAME}-Windows-x86_64.exe

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            shio-Linux-x86_64
            shio-Windows-x86_64.exe

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Update Continuous Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: "Latest Development Build"
          prerelease: true
          files: artifacts/*
